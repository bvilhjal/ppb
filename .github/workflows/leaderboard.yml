name: Leaderboard

on:
  push:
    branches: [main]
    paths:
      - "results/**"
      - "scripts/build_leaderboard.py"
      - ".github/workflows/leaderboard.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install registry validator
        run: pip install -e ".[test]"
      - name: Validate result registry
        run: pytest -q tests/test_results_registry.py
      - run: python scripts/build_leaderboard.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
